name: Deploy to VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code (for change detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          # Compare current commit with previous
          UI_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'ui/' | head -1)
          API_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'api/' | head -1)
          OTHER_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'docker-compose.yaml' '.github/workflows/' 'scripts/' 'nginx/' | head -1)

          if [ -n "$UI_CHANGED" ] || [ -n "$OTHER_CHANGED" ]; then
            echo "rebuild_ui=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild_ui=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "$API_CHANGED" ] || [ -n "$OTHER_CHANGED" ]; then
            echo "rebuild_api=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild_api=false" >> $GITHUB_OUTPUT
          fi

          echo "UI changed: $( [ -n \"$UI_CHANGED\" ] && echo yes || echo no )"
          echo "API changed: $( [ -n \"$API_CHANGED\" ] && echo yes || echo no )"
          echo "Infra changed: $( [ -n \"$OTHER_CHANGED\" ] && echo yes || echo no )"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pre-generate SSH keys and wait for propagation
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 3072 -f ~/.ssh/google_compute_engine -N "" -q
          echo "Waiting for SSH key to propagate..."
          sleep 30

      - name: Deploy to VM
        env:
          REBUILD_UI: ${{ steps.changes.outputs.rebuild_ui }}
          REBUILD_API: ${{ steps.changes.outputs.rebuild_api }}
        run: |
          for attempt in 1 2 3; do
            echo "=== SSH attempt $attempt of 3 ==="
            gcloud compute ssh kkconsultancy@kkconnect-prod \
              --zone=asia-south1-a \
              --tunnel-through-iap \
              --project=kumuda-d2c11 \
              --quiet \
              --ssh-flag="-o ConnectTimeout=30" \
              --command="cd /home/kkconsultancy/kumuda-communication && git fetch origin main && git reset --hard origin/main && git clean -fd -e Caddyfile -e .env && bash scripts/deploy.sh $REBUILD_UI $REBUILD_API"
            SSH_EXIT=$?
            if [ $SSH_EXIT -eq 0 ]; then
              echo "Deploy succeeded!"
              exit 0
            elif [ $SSH_EXIT -eq 255 ]; then
              echo "SSH connection failed (exit 255), retrying in 20s..."
              sleep 20
            else
              echo "Deploy script failed with exit code $SSH_EXIT"
              exit $SSH_EXIT
            fi
          done
          echo "All SSH connection attempts failed"
          exit 1
