name: Deploy to VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pre-generate SSH keys
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 3072 -f ~/.ssh/google_compute_engine -N "" -q

      - name: Pull code and rebuild on VM
        run: |
          gcloud compute ssh kkconnect-prod \
            --zone=asia-south1-a \
            --tunnel-through-iap \
            --project=kumuda-d2c11 \
            --quiet \
            --command="bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd ~/kumuda-communication

          echo "==> Pulling latest code..."
          git pull origin main

          echo "==> Rebuilding UI image from source..."
          docker build -t kkconnect-ui:latest -f ui/Dockerfile .

          echo "==> Recreating containers..."
          docker compose up -d --force-recreate ui
          docker compose restart api

          echo "==> Re-linking Caddy network..."
          docker network connect kumuda-communication_app-network caddy 2>/dev/null || true

          echo "==> Waiting for health checks..."
          sleep 30
          curl -sf http://localhost:8000/api/v1/health > /dev/null && echo "API: healthy" || echo "API: UNHEALTHY"
          curl -sf http://localhost:3010/ > /dev/null && echo "UI: healthy" || echo "UI: UNHEALTHY"

          echo "==> Deploy complete!"
          DEPLOY_SCRIPT
