services:
  api:
    cap_add:
      - SYS_PTRACE
    volumes:
      - ./api:/app/api
      - ./scripts/start_services_docker.sh:/app/scripts/start_services_docker.sh
    environment:
      # Object storage moved from the bundled local MinIO container to a
      # private GCS bucket (dograh-voice-audio-kumuda-d2c11), accessed via
      # GCS's S3-compatible interoperability API with HMAC keys. Bucket has
      # no public access; playback URLs are real presigned links (see the
      # aget_signed_url patch in services/filesystem/minio.py).
      MINIO_ENDPOINT: "storage.googleapis.com"
      MINIO_PUBLIC_ENDPOINT: "https://storage.googleapis.com"
      MINIO_ACCESS_KEY: ${GCS_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${GCS_ACCESS_KEY_SECRET}
      MINIO_BUCKET: "dograh-voice-audio-kumuda-d2c11"
      MINIO_SECURE: "true"
    # Storage is fully on GCS now; drop the hard dependency on the bundled
    # local MinIO container (it's unused dead weight in this deployment).
    depends_on: !override
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Never start the bundled local MinIO container — nothing writes to it
  # anymore. Gated behind a profile that's never activated, rather than
  # deleted, so `docker compose config` still shows why it's here.
  minio:
    profiles: ["disabled-unused-local-minio"]
